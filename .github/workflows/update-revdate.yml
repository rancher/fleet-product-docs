name: Update revdate

on:
  pull_request:
    types:
      - labeled
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  update-revdate:
    if: contains(github.event.pull_request.labels.*.name, 'update revdate')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Set today's date
        id: date
        run: |
          echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Find changed AsciiDoc files
        id: changed-files
        run: |
          BASE_REF="origin/${{ github.base_ref }}"

          git fetch origin ${{ github.base_ref }}

          FILES=$(git diff --name-only "$BASE_REF"...HEAD | grep '\.adoc$' || true)

          if [ -z "$FILES" ]; then
            echo "No changed .adoc files detected."
            echo "no_files=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed .adoc files:"
          echo "$FILES"

          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update revdate fields
        id: update
        if: steps.changed-files.outputs.no_files != 'true'
        env:
          TODAY: ${{ steps.date.outputs.today }}
          FILES: ${{ steps.changed-files.outputs.files }}
        run: |
          UPDATED=0

          for file in $FILES; do
            if [ ! -f "$file" ]; then
              echo "Skipping missing file: $file"
              continue
            fi

            echo "Processing: $file"

            # Skip files without :revdate:
            if ! grep -q "^:revdate:" "$file"; then
              echo "  -> No :revdate: found. Skipping."
              continue
            fi

            # Skip already updated files
            if grep -q "^:revdate: $TODAY$" "$file"; then
              echo "  -> Already updated."
              continue
            fi

            # Update :revdate:
            sed -i "s/^:revdate:.*/:revdate: $TODAY/" "$file"

            # Ensure :page-revdate: exists and is correct
            if grep -q "^:page-revdate:" "$file"; then
              sed -i "s/^:page-revdate:.*/:page-revdate: {revdate}/" "$file"
            else
              awk '
                BEGIN { inserted=0 }
                /^:revdate:/ {
                  print
                  print ":page-revdate: {revdate}"
                  inserted=1
                  next
                }
                { print }
              ' "$file" > "$file.tmp"

              mv "$file.tmp" "$file"
            fi

            echo "  -> Updated $file"
            UPDATED=1
          done

          if [ "$UPDATED" -eq 0 ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Debug status
        if: |
          steps.changed-files.outputs.no_files != 'true' &&
          steps.update.outputs.no_changes != 'true'
        run: |
          echo "Git status:"
          git status

          echo ""
          echo "Changed files:"
          git diff --name-only

      - name: Commit changes
        if: |
          steps.changed-files.outputs.no_files != 'true' &&
          steps.update.outputs.no_changes != 'true'
        env:
          TODAY: ${{ steps.date.outputs.today }}
        run: |
          git add .

          git diff --cached --quiet && {
            echo "Nothing to commit"
            exit 0
          }

          git commit -m "docs: update revdate to $TODAY"

      - name: Push changes
        if: |
          steps.changed-files.outputs.no_files != 'true' &&
          steps.update.outputs.no_changes != 'true'
        run: |
          git push origin HEAD:${{ github.head_ref }}
          